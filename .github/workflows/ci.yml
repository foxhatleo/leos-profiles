name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

jobs:
  zsh-syntax:
    name: Zsh syntax (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Syntax-check zsh files
        run: |
          rc=0
          for f in zsh/*.zsh zsh/path/*.zsh; do
            zsh -n "$f" || { echo "syntax error: $f"; rc=1; }
          done
          exit "$rc"
      - name: Source profile in a clean home and test lazy helpers
        run: zsh tests/profile-test.zsh

  install-checks:
    name: Installer + util checks (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install shell test dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh
      - name: Compile and exercise the metadata utility
        run: python3 -m py_compile util/rmdsstore.py
      - name: Test metadata utility behaviour
        run: python3 tests/rmdsstore_test.py
      - name: Test deterministic installer logic
        run: bash tests/install-test.sh
      - name: Verify locked Linux artifacts and digests
        run: bash tests/locked-artifacts-test.sh
      - name: Lint deterministic installer
        run: shellcheck -s bash -x install.sh installer/lock.sh tests/*.sh
      - name: Validate starship TOML
        run: python3 -c "import tomllib; tomllib.load(open('zsh/starship.toml','rb')); tomllib.load(open('zsh/starship-plain.toml','rb'))"
      - name: Syntax-check the installer's fenced bash blocks
        run: |
          # Validate every deterministic bootstrap snippet in the AI runbook.
          awk '/^```bash$/{f=1;n++;next} /^```$/{f=0;next} f{print > ("blk-" n ".sh")}' QUICK-INSTALL.md
          shopt -s nullglob   # zero bash blocks -> empty loop, not a literal "blk-*.sh" false error
          rc=0
          for b in blk-*.sh; do
            bash -n "$b" || { echo "bash syntax error in QUICK-INSTALL.md block: $b"; rc=1; }
          done
          rm -f blk-*.sh
          exit "$rc"
      - name: Clone locked plugins and source their combined Zsh integration
        run: bash tests/locked-plugins-test.sh
      - name: Smoke-test the deterministic apply in dry-run (apt)
        run: bash tests/apply-dryrun-test.sh

  package-map-macos:
    name: Package map / ${{ matrix.runner }} (gating)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-14, macos-15, macos-15-intel, macos-26, macos-26-intel]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Refresh formula metadata and tap Heroku
        run: brew update && brew tap heroku/brew
      - name: Verify mapped formula availability
        run: bash tests/package-map-availability.sh macos
      - name: Verify locked macOS artifacts and digests
        run: bash tests/locked-artifacts-test.sh
      - name: Run deterministic installer tests
        run: bash tests/install-test.sh
      - name: Run Zsh profile tests
        run: zsh tests/profile-test.zsh
      - name: Smoke-test the deterministic apply in dry-run (macOS)
        run: bash tests/apply-dryrun-test.sh

  package-map-apt:
    name: Package map / ${{ matrix.runner }} (gating)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Refresh package metadata
        run: sudo apt-get update
      - name: Verify mapped package availability
        run: bash tests/package-map-availability.sh apt

  package-map-container:
    name: Package map / ${{ matrix.label }} (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: apt
            label: Debian 12
            image: debian:12
          - family: apt
            label: Debian 13
            image: debian:13
          - family: fedora
            label: Fedora 43
            image: fedora:43
          - family: fedora
            label: Fedora 44
            image: fedora:44
          - family: arch
            label: Arch latest x86_64
            image: archlinux:latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Verify mapped package availability
        env:
          FAMILY: ${{ matrix.family }}
          IMAGE: ${{ matrix.image }}
        run: |
          if [[ $FAMILY == apt ]]; then
            docker run --rm -v "$PWD:/repo:ro" "$IMAGE" bash -lc '
              apt-get update && apt-get install -y ca-certificates &&
              bash /repo/tests/package-map-availability.sh apt &&
              bash /repo/tests/apply-dryrun-test.sh
            '
          elif [[ $FAMILY == fedora ]]; then
            docker run --rm -v "$PWD:/repo:ro" "$IMAGE" bash -lc '
              dnf install -y findutils grep rpm ca-certificates &&
              dnf install -y "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" &&
              bash /repo/tests/package-map-availability.sh fedora &&
              bash /repo/tests/apply-dryrun-test.sh
            '
          else
            docker run --rm -v "$PWD:/repo:ro" "$IMAGE" bash -lc '
              pacman -Sy --noconfirm &&
              bash /repo/tests/package-map-availability.sh arch &&
              bash /repo/tests/apply-dryrun-test.sh
            '
          fi

  locked-linux-arm64:
    name: Locked Linux arm64 artifacts (gating)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Verify every locked Linux arm64 binary and digest
        run: bash tests/locked-artifacts-test.sh
