name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  zsh-syntax:
    name: Zsh syntax (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Syntax-check zsh files
        run: |
          rc=0
          for f in zsh/*.zsh zsh/path/*.zsh; do
            zsh -n "$f" || { echo "syntax error: $f"; rc=1; }
          done
          exit "$rc"
      - name: Source profile in a clean home and test lazy helpers
        run: zsh tests/profile-test.zsh

  install-checks:
    name: Installer + util checks (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Compile and exercise the metadata utility
        run: python3 -m py_compile util/rmdsstore.py
      - name: Test metadata utility behaviour
        run: python3 tests/rmdsstore_test.py
      - name: Test deterministic installer logic
        run: bash tests/install-test.sh
      - name: Verify locked Linux artifacts and digests
        run: bash tests/locked-artifacts-test.sh
      - name: Lint deterministic installer
        run: shellcheck -s bash install.sh installer/lock.sh tests/install-test.sh tests/package-map-availability.sh tests/locked-artifacts-test.sh
      - name: Validate starship TOML
        run: python3 -c "import tomllib; tomllib.load(open('zsh/starship.toml','rb')); tomllib.load(open('zsh/starship-plain.toml','rb'))"
      - name: Syntax-check the installer's fenced bash blocks
        run: |
          # The installer IS QUICK-INSTALL.md — bash -n every ```bash block so a syntax
          # error in the runbook can't ship silently.
          awk '/^```bash$/{f=1;n++;next} /^```$/{f=0;next} f{print > ("blk-" n ".sh")}' QUICK-INSTALL.md
          shopt -s nullglob   # zero bash blocks -> empty loop, not a literal "blk-*.sh" false error
          rc=0
          for b in blk-*.sh; do
            bash -n "$b" || { echo "bash syntax error in QUICK-INSTALL.md block: $b"; rc=1; }
          done
          rm -f blk-*.sh
          exit "$rc"

  package-map-macos:
    name: Package map / macOS (gating)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Refresh formula metadata and tap Heroku
        run: brew update && brew tap heroku/brew
      - name: Verify mapped formula availability
        run: bash tests/package-map-availability.sh macos
      - name: Verify locked macOS artifacts and digests
        run: bash tests/locked-artifacts-test.sh

  package-map-apt:
    name: Package map / Ubuntu (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Refresh package metadata
        run: sudo apt-get update
      - name: Verify mapped package availability
        run: bash tests/package-map-availability.sh apt

  package-map-container:
    name: Package map / ${{ matrix.family }} (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - family: fedora
            image: fedora:latest
          - family: arch
            image: archlinux:latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Verify mapped package availability
        env:
          FAMILY: ${{ matrix.family }}
          IMAGE: ${{ matrix.image }}
        run: |
          if [[ $FAMILY == fedora ]]; then
            docker run --rm -v "$PWD:/repo:ro" "$IMAGE" bash -lc '
              dnf install -y findutils grep rpm ca-certificates &&
              dnf install -y "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" &&
              bash /repo/tests/package-map-availability.sh fedora
            '
          else
            docker run --rm -v "$PWD:/repo:ro" "$IMAGE" bash -lc '
              pacman -Sy --noconfirm &&
              bash /repo/tests/package-map-availability.sh arch
            '
          fi
